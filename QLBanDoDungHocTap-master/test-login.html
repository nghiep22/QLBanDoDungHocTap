<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background: #e31e24;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #c01a1f;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .info {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <h1>Test Login API</h1>
    
    <div class="form-group">
        <label>API URL:</label>
        <input type="text" id="apiUrl" value="http://localhost:5000/login/api/auth/login">
    </div>
    
    <div class="form-group">
        <label>Tên đăng nhập:</label>
        <input type="text" id="username" value="admin">
    </div>
    
    <div class="form-group">
        <label>Mật khẩu:</label>
        <input type="password" id="password" value="123456">
    </div>
    
    <button onclick="testLogin()">Test Login</button>
    <button onclick="testWithFetch()">Test với Fetch (như React)</button>
    
    <div id="result"></div>

    <script>
        function showResult(message, type = 'info') {
            const resultDiv = document.getElementById('result');
            resultDiv.className = `result ${type}`;
            resultDiv.textContent = message;
        }

        async function testLogin() {
            const apiUrl = document.getElementById('apiUrl').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            showResult('Đang gửi request...', 'info');

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        tenDangNhap: username,
                        matKhau: password
                    })
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);

                const text = await response.text();
                console.log('Response text:', text);

                if (!response.ok) {
                    showResult(`❌ Lỗi ${response.status}:\n\n${text}`, 'error');
                    return;
                }

                try {
                    const data = JSON.parse(text);
                    showResult(`✅ Thành công!\n\n${JSON.stringify(data, null, 2)}`, 'success');
                } catch (e) {
                    showResult(`⚠️ Response không phải JSON:\n\n${text}`, 'error');
                }
            } catch (error) {
                showResult(`❌ Lỗi kết nối:\n\n${error.message}`, 'error');
                console.error('Error:', error);
            }
        }

        async function testWithFetch() {
            const apiUrl = document.getElementById('apiUrl').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            showResult('Đang test với Fetch API (giống React)...', 'info');

            const API_BASE_URL = 'http://localhost:5000';

            try {
                const response = await fetch(`${API_BASE_URL}/login/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        tenDangNhap: username,
                        matKhau: password
                    }),
                });

                const text = await response.text();
                
                console.log('=== FETCH TEST ===');
                console.log('Status:', response.status);
                console.log('OK:', response.ok);
                console.log('Text:', text);

                if (!response.ok) {
                    let errorMessage = 'Đăng nhập thất bại';
                    try {
                        const error = JSON.parse(text);
                        errorMessage = error.message || errorMessage;
                    } catch {
                        errorMessage = text || errorMessage;
                    }
                    showResult(`❌ Lỗi:\n\n${errorMessage}`, 'error');
                    return;
                }

                try {
                    const data = JSON.parse(text);
                    showResult(`✅ Thành công (Fetch API)!\n\n${JSON.stringify(data, null, 2)}`, 'success');
                } catch {
                    showResult(`⚠️ Lỗi parse JSON:\n\n${text}`, 'error');
                }
            } catch (error) {
                showResult(`❌ Lỗi:\n\n${error.message}`, 'error');
                console.error('Error:', error);
            }
        }

        // Test khi load trang
        window.addEventListener('load', () => {
            console.log('Page loaded. Ready to test.');
        });
    </script>
</body>
</html>
